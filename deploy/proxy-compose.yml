# Shared reverse proxy for the VPS. Owns ports 80/443 and terminates TLS
# (automatic Let's Encrypt). Routes by hostname to each app over their docker
# networks. Lives in /opt/proxy on the server; not part of the app auto-deploy.
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web_proxy
      - prviewer

volumes:
  caddy_data:
  caddy_config:

networks:
  # Created by this compose; eventflow's stack joins it as external.
  web_proxy:
    name: web_proxy
  # The github_pr_viewer stack's pre-existing network, so Caddy can reach its
  # nginx container directly by service name.
  prviewer:
    name: github_pr_viewer_default
    external: true
